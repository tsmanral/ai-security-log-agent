name: security-scan

on:
  pull_request:
  schedule:
    # Weekly full-history secret sweep — ongoing proof the §5 history purge holds.
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (PR diff + full on schedule)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  trufflehog:
    name: trufflehog full-history (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified --only-verified
