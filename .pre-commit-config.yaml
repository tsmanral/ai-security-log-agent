# Pre-commit hooks for LSADRA.
#   pip install pre-commit
#   pre-commit install                       # lint/format/secret hooks
#   pre-commit install --hook-type commit-msg  # Conventional Commits + DCO check
#
# Note: `rev` pins below are indicative and are kept current by Dependabot /
# `pre-commit autoupdate`. Rust hooks (rustfmt/clippy) are added at M2 with the
# first Cargo workspace — the repo currently contains zero Rust.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
