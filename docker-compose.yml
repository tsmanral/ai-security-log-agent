# LSADRA V3 — Docker Compose
# Production configuration with API, Dashboard, and Agent Simulator services.

version: "3.9"

services:
  # ── API Server ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: lsadra-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - LSADRA_API_HOST=0.0.0.0
      - LSADRA_API_PORT=8000
      - LSADRA_REQUIRE_TLS=${LSADRA_REQUIRE_TLS:-false}
      - LSADRA_JWT_SECRET=${LSADRA_JWT_SECRET:-changeme-in-production}
      - LSADRA_ABUSEIPDB_API_KEY=${LSADRA_ABUSEIPDB_API_KEY:-}
      - LSADRA_MIN_BASELINE_EVENTS=${LSADRA_MIN_BASELINE_EVENTS:-200}
      - LSADRA_RETENTION_DAYS=${LSADRA_RETENTION_DAYS:-30}
    volumes:
      - sentinel-data:/app/data
      - sentinel-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Streamlit Dashboard ─────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: lsadra-dashboard
    command: >
      streamlit run lsadra/ui/dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    ports:
      - "${DASH_PORT:-8501}:8501"
    environment:
      - LSADRA_JWT_SECRET=${LSADRA_JWT_SECRET:-changeme-in-production}
    volumes:
      - sentinel-data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Agent Simulator ────────────────────────────────────────────────────
  agent-sim:
    build: .
    container_name: lsadra-agent-sim
    command: >
      python -c "
      import time, requests, sys;
      time.sleep(5);
      print('Agent sim ready — waiting for manual trigger.');
      while True: time.sleep(3600)
      "
    environment:
      - SERVER_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sentinel-data:
    driver: local
  sentinel-logs:
    driver: local
